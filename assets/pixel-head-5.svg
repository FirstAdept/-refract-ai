  <rect x="4" y="5" width="8" height="1" fill="#fad4b0"/>
  <rect x="4" y="6" width="8" height="1" fill="#fad4b0"/>
  <rect x="4" y="7" width="8" height="1" fill="#fad4b0"/>
  <rect x="4" y="8" width="8" height="1" fill="#fad4b0"/>
  <rect x="4" y="9" width="8" height="1" fill="#fad4b0"/>
  <rect x="5" y="10" width="6" height="1" fill="#fad4b0"/>
  <!-- Bangs / fringe -->
