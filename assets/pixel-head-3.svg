<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="100" height="100">
  <!-- Сергей Петоян: чёрные волосы, усы -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Hair -->
  <rect x="4" y="2" width="8" height="1" fill="#1a0f08"/>
  <rect x="3" y="3" width="10" height="1" fill="#1a0f08"/>
  <rect x="3" y="4" width="10" height="1" fill="#1a0f08"/>
  <rect x="2" y="4" width="1" height="2" fill="#1a0f08"/>
  <rect x="13" y="4" width="1" height="2" fill="#1a0f08"/>
  <!-- Face -->
  <rect x="3" y="5" width="10" height="1" fill="#e8b896"/>
  <rect x="3" y="6" width="10" height="1" fill="#e8b896"/>
  <rect x="3" y="7" width="10" height="1" fill="#e8b896"/>
  <rect x="3" y="8" width="10" height="1" fill="#e8b896"/>
  <rect x="3" y="9" width="10" height="1" fill="#e8b896"/>
  <rect x="4" y="10" width="8" height="1" fill="#e8b896"/>
  <!-- Eyes -->
  <rect x="5" y="7" width="1" height="1" fill="#1a1a2e"/>
  <rect x="10" y="7" width="1" height="1" fill="#1a1a2e"/>
  <!-- Moustache -->
  <rect x="5" y="9" width="6" height="1" fill="#1a0f08"/>
  <!-- Mouth -->
  <rect x="7" y="10" width="2" height="1" fill="#8b4a2f"/>
  <!-- Neck -->
  <rect x="6" y="11" width="4" height="2" fill="#c89976"/>
  <!-- Shoulders -->
  <rect x="3" y="13" width="10" height="3" fill="#14141e"/>
</svg>
