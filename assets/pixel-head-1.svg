<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="100" height="100">
  <!-- Станислав: тёмные волосы, борода -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Hair -->
  <rect x="4" y="2" width="8" height="1" fill="#2a1810"/>
  <rect x="3" y="3" width="10" height="1" fill="#2a1810"/>
  <rect x="3" y="4" width="10" height="1" fill="#2a1810"/>
  <!-- Face -->
  <rect x="4" y="5" width="8" height="1" fill="#f4c4a0"/>
  <rect x="3" y="6" width="10" height="1" fill="#f4c4a0"/>
  <rect x="3" y="7" width="10" height="1" fill="#f4c4a0"/>
  <rect x="3" y="8" width="10" height="1" fill="#f4c4a0"/>
  <rect x="3" y="9" width="10" height="1" fill="#f4c4a0"/>
  <rect x="4" y="10" width="8" height="1" fill="#f4c4a0"/>
  <!-- Eyes -->
  <rect x="5" y="7" width="1" height="1" fill="#1a1a2e"/>
  <rect x="10" y="7" width="1" height="1" fill="#1a1a2e"/>
  <!-- Beard -->
  <rect x="4" y="9" width="8" height="1" fill="#2a1810"/>
  <rect x="5" y="10" width="6" height="1" fill="#2a1810"/>
  <!-- Neck -->
  <rect x="6" y="11" width="4" height="2" fill="#d4a080"/>
  <!-- Shoulders -->
  <rect x="3" y="13" width="10" height="3" fill="#14141e"/>
