<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="100" height="100">
  <!-- Анастасия: длинные волосы -->
  <rect width="16" height="16" fill="transparent"/>
  <!-- Long hair back -->
  <rect x="2" y="4" width="12" height="9" fill="#8b4513"/>
  <!-- Hair top -->
  <rect x="3" y="2" width="10" height="1" fill="#6b3410"/>
  <rect x="2" y="3" width="12" height="1" fill="#6b3410"/>
  <!-- Face -->
  <rect x="4" y="4" width="8" height="1" fill="#f8cca8"/>
  <rect x="4" y="5" width="8" height="1" fill="#f8cca8"/>
  <rect x="4" y="6" width="8" height="1" fill="#f8cca8"/>
  <rect x="4" y="7" width="8" height="1" fill="#f8cca8"/>
  <rect x="4" y="8" width="8" height="1" fill="#f8cca8"/>
  <rect x="4" y="9" width="8" height="1" fill="#f8cca8"/>
  <rect x="5" y="10" width="6" height="1" fill="#f8cca8"/>
  <!-- Bangs -->
  <rect x="4" y="4" width="8" height="1" fill="#6b3410"/>
  <rect x="4" y="5" width="2" height="1" fill="#6b3410"/>
  <rect x="10" y="5" width="2" height="1" fill="#6b3410"/>
  <!-- Eyes -->
  <rect x="6" y="7" width="1" height="1" fill="#1a1a2e"/>
  <rect x="9" y="7" width="1" height="1" fill="#1a1a2e"/>
  <!-- Lips -->
  <rect x="7" y="9" width="2" height="1" fill="#c85858"/>
  <!-- Neck -->
  <rect x="6" y="11" width="4" height="1" fill="#e0b898"/>
  <!-- Shoulders -->
  <rect x="3" y="12" width="10" height="4" fill="#14141e"/>
</svg>
